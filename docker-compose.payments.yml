services:
  pagui-postgres:
    image: postgres:16-alpine
    container_name: pagui-postgres
    environment:
      POSTGRES_DB: ${PAGUI_POSTGRES_DB:-pagui}
      POSTGRES_USER: ${PAGUI_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${PAGUI_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${PAGUI_POSTGRES_HOST_PORT:-5439}:5432"
    volumes:
      - pagui-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  pagui-redis:
    image: redis:7-alpine
    container_name: pagui-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${PAGUI_REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - pagui-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  pagui-backend:
    build:
      context: ../pagui/backend
      dockerfile: Dockerfile
    container_name: pagui-backend
    working_dir: /app
    command: >
      sh -c "bun run src/index.ts init-db &&
      (bun run src/index.ts seed || true) &&
      bun run src/index.ts"
    depends_on:
      pagui-postgres:
        condition: service_healthy
      pagui-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${PAGUI_DATABASE_URL:-postgres://postgres:postgres@pagui-postgres:5432/pagui}
      REDIS_URL: ${PAGUI_REDIS_URL:-redis://pagui-redis:6379}
      ENCRYPTION_KEY: ${PAGUI_ENCRYPTION_KEY:-restoconnect-local-encryption-key}
      JWT_SECRET: ${PAGUI_JWT_SECRET:-restoconnect-local-pagui-secret}
      JWT_EXPIRES_IN: ${PAGUI_JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_SECRET: ${PAGUI_JWT_REFRESH_SECRET:-restoconnect-local-pagui-refresh}
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: development
    ports:
      - "${PAGUI_BACKEND_HOST_PORT:-3000}:3000"
    restart: unless-stopped

  backend:
    depends_on:
      pagui-backend:
        condition: service_started
    environment:
      APP_PAGUI_ENABLED: "true"
      APP_PAGUI_BASE_URL: http://pagui-backend:3000
      APP_PAGUI_EMAIL: ${APP_PAGUI_EMAIL:-admin@pagui.com}
      APP_PAGUI_PASSWORD: ${APP_PAGUI_PASSWORD:-admin123}
      APP_PAGUI_BANK_ID: ${APP_PAGUI_BANK_ID:-1}

volumes:
  pagui-postgres-data:
  pagui-redis-data:
