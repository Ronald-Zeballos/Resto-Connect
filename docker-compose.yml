services:
  postgres:
    image: postgres:16
    container_name: restoconnect-postgres
    environment:
      POSTGRES_DB: restoconnect
      POSTGRES_USER: restoconnect
      POSTGRES_PASSWORD: restoconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restoconnect-api
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/restoconnect
      SPRING_DATASOURCE_USERNAME: restoconnect
      SPRING_DATASOURCE_PASSWORD: restoconnect
      APP_JWT_SECRET: cambio-esta-clave-en-produccion-cambio-esta-clave
      APP_JWT_EXPIRATION_MINUTES: 480
    ports:
      - "8080:8080"

volumes:
  postgres-data:

